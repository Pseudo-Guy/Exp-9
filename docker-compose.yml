version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: exp9-api
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: exp9-web
    depends_on:
      - api
    ports:
      - "80:80"

name: CI-CD Docker

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Lint and Build Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [api, web]

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        if: matrix.app == 'web'
        run: npm run build

      - name: Start check for API
        if: matrix.app == 'api'
        run: node --check src/index.js

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/exp9-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/exp9-api:${{ github.sha }}

      - name: Build and push WEB image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/exp9-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/exp9-web:${{ github.sha }}
